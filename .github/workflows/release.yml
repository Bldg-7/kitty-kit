name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build Chrome
        run: npm run zip

      - name: Build Firefox
        run: npm run zip:firefox

      - name: Prepare release assets
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mv .output/kitty-kit-${VERSION}-chrome.zip ./kitty-kit-${VERSION}-chrome.zip
          mv .output/kitty-kit-${VERSION}-firefox.zip ./kitty-kit-${VERSION}-firefox.zip
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            kitty-kit-${{ env.VERSION }}-chrome.zip
            kitty-kit-${{ env.VERSION }}-firefox.zip
          body: |
            ## Install

            **Chrome**: Download `kitty-kit-${{ env.VERSION }}-chrome.zip`, unzip, then load via `chrome://extensions` → Developer mode → "Load unpacked".

            **Firefox**: Download `kitty-kit-${{ env.VERSION }}-firefox.zip`, then drag & drop onto Firefox, or submit to AMO for signing.
